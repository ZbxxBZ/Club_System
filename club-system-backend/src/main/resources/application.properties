spring.application.name=club-system-backend
spring.profiles.active=local

# datasource
spring.datasource.url=jdbc:mysql://localhost:3306/club_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# mybatis
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.jdbc-type-for-null=null
mybatis.mapper-locations=classpath*:mapper/*.xml

# jwt
app.jwt.secret=${JWT_SECRET:changeme}
app.jwt.expire-seconds=7200

# tencent cos
cos.secret-id=${COS_SECRET_ID:changeme}
cos.secret-key=${COS_SECRET_KEY:changeme}
cos.region=ap-beijing
cos.bucket=${COS_BUCKET:changeme}
cos.domain=${COS_DOMAIN:https://example.cos.ap-beijing.myqcloud.com}
cos.folder=uploads

# TongRDS (Redis compatible)
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
